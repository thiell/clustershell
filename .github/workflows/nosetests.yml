name: ClusterShell nose2

on: [push, pull_request, merge_group]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12', '3.13']
        include:
          - os: ubuntu-22.04
            python-version: '3.7'
    name: Tests with Python ${{ matrix.python-version }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5.2.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install ClusterShell
      run: |
        set -euxo pipefail
        python -m pip install --upgrade pip
        python -m pip -V
        pip install -v .

    - name: Install test deps (nose2 + coverage)
      run: |
        set -euxo pipefail
        pip install -v nose2 coverage

    - name: Ensure tests/ is importable (nose2/unittest discovery)
      run: |
        set -euxo pipefail
        test -d tests
        test -f tests/__init__.py || : > tests/__init__.py
        ls -la tests/__init__.py

    - name: Write unittest.cfg (nose2 discovery config)
      run: |
        set -euxo pipefail
        cat > unittest.cfg <<'EOF'
        [nose2]
        start-dir = tests
        top-level-directory = .
        verbosity = 2

        [discovery]
        pattern = *Test.py
        EOF
        echo "=== unittest.cfg ==="
        cat unittest.cfg

    - name: Allow us to SSH passwordless to localhost
      run: |
        set -euxo pipefail
        chmod og-rw ~
        ssh-keygen -f ~/.ssh/id_rsa -N ""
        cp ~/.ssh/{id_rsa.pub,authorized_keys}

    - name: Avoid ssh "known hosts" warnings
      run: |
        set -euxo pipefail
        printf '%s\n    %s\n    %s\n' 'Host *' 'StrictHostKeyChecking no' 'LogLevel ERROR' >> ~/.ssh/config

    - name: Set Python paths when sshing for gateway tests
      run: |
        set -euxo pipefail
        sed -i "1iexport CLUSTERSHELL_GW_PYTHON_EXECUTABLE=$(which python)" ~/.bashrc
        sed -i "2iexport PYTHONPATH=\$PYTHONPATH:$(realpath $pythonLocation/lib/python*/site-packages)" ~/.bashrc
        head -2 ~/.bashrc

    - name: Install pdsh to test WorkerPdsh
      run: |
        set -euxo pipefail
        sudo apt-get update
        sudo apt-get -y install pdsh
        sudo sh -c 'echo ssh > /etc/pdsh/rcmd_default'

    - name: Add tests/bin to remote PATH
      run: |
        set -euxo pipefail
        sed -i "1iexport PATH=$PWD/tests/bin:\$PATH" ~/.bashrc
        head -1 ~/.bashrc
        ssh 127.0.0.2 which hostname
        ssh 127.0.0.2 hostname

    - name: Debug unittest discovery (pre-flight)
      run: |
        set -euxo pipefail
        python - <<'PY'
        import unittest

        loader = unittest.TestLoader()
        suite = loader.discover("tests", pattern="*Test.py", top_level_dir=".")

        def iter_tests(s):
          for t in s:
            if isinstance(t, unittest.TestSuite):
              yield from iter_tests(t)
            else:
              yield t

        flat = list(iter_tests(suite))
        print("discovered test cases:", len(flat))
        for t in flat[:50]:
          try:
            print(t.id())
          except Exception as e:
            print("un-id-able test:", t, e)
        PY

    - name: Run tests (coverage + nose2, explicit config) (capture output)
      id: tests
      run: |
        set -euxo pipefail
        python -VV
        rm -f .coverage .coverage.* || true
        coverage run --branch --source=ClusterShell -m nose2 \
          --config unittest.cfg --no-user-config \
          -v -s tests -t . 2>&1 | tee nose2.log
        coverage report -m --fail-under=0 2>&1 | tee coverage.log

    - name: Debug (environment + packaging)
      if: always()
      run: |
        set -euxo pipefail
        python -VV
        which python
        python -m pip -V
        python -m pip debug -v
        python -m pip show ClusterShell setuptools wheel pip coverage nose2 || true
        python -m pip freeze --all | sort | egrep -i '^(clustershell|setuptools|wheel|pip|coverage|nose2)=' || true
        echo "=== repo root listing ==="
        pwd
        ls -la
        echo "=== unittest.cfg ==="
        ls -la unittest.cfg
        cat unittest.cfg

    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: logs-py${{ matrix.python-version }}
        path: |
          nose2.log
          coverage.log
