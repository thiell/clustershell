name: ClusterShell nosetests

on: [push, pull_request, merge_group]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12', '3.13']
        include:
          - os: ubuntu-22.04
            python-version: '3.7'
    name: Tests with Python ${{ matrix.python-version }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5.2.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install ClusterShell
      run: |
        set -euxo pipefail
        python -m pip install --upgrade pip
        python -m pip -V
        pip install -v .

    - name: Install test deps (nose2 + coverage)
      run: |
        set -euxo pipefail
        pip install -v nose2 coverage

    - name: Allow us to SSH passwordless to localhost
      run: |
        set -euxo pipefail
        chmod og-rw ~
        ssh-keygen -f ~/.ssh/id_rsa -N ""
        cp ~/.ssh/{id_rsa.pub,authorized_keys}

    - name: Avoid ssh "known hosts" warnings
      run: |
        set -euxo pipefail
        printf '%s\n    %s\n    %s\n' 'Host *' 'StrictHostKeyChecking no' 'LogLevel ERROR' >> ~/.ssh/config

    - name: Set Python paths when sshing for gateway tests
      run: |
        set -euxo pipefail
        sed -i "1iexport CLUSTERSHELL_GW_PYTHON_EXECUTABLE=$(which python)" ~/.bashrc
        sed -i "2iexport PYTHONPATH=\$PYTHONPATH:$(realpath $pythonLocation/lib/python*/site-packages)" ~/.bashrc
        head -2 ~/.bashrc

    - name: Install pdsh to test WorkerPdsh
      run: |
        set -euxo pipefail
        sudo apt-get update
        sudo apt-get -y install pdsh
        sudo sh -c 'echo ssh > /etc/pdsh/rcmd_default'

    - name: Add tests/bin to remote PATH
      run: |
        set -euxo pipefail
        sed -i "1iexport PATH=$PWD/tests/bin:\$PATH" ~/.bashrc
        head -1 ~/.bashrc
        ssh 127.0.0.2 which hostname
        ssh 127.0.0.2 hostname

    - name: Debug nose2 discovery
      run: |
        set -euxo pipefail
        python - <<'PY'
        import os
        print("cwd:", os.getcwd())
        print("tests dir exists:", os.path.isdir("tests"))
        for root, dirs, files in os.walk("tests"):
          for f in sorted(files)[:50]:
            if f.endswith(".py"):
              print(os.path.join(root, f))
          break
        PY
        nose2 -v --collect-only -s tests

    - name: Run tests (nose2 + coverage)
      run: |
        set -euxo pipefail
        python -VV
        rm -f .coverage .coverage.* || true
        nose2 2>&1 | tee nose2.log

    - name: Debug (packaging versions)
      if: always()
      run: |
        set -euxo pipefail
        python -VV
        which python
        python -m pip -V
        python -m pip debug -v
        python -m pip show ClusterShell setuptools wheel pip coverage nose2 || true
        python -m pip freeze --all | sort | egrep -i '^(clustershell|setuptools|wheel|pip|coverage|nose2)=' || true

    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: logs-py${{ matrix.python-version }}
        path: |
          nose2.log
